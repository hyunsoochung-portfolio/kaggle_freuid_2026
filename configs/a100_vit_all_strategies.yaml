name: a100_vit_all_strategies
seed: 42

# data
data_dir: data
image_size: 384
val_strategy: cross_domain   # hold out entire doc types — catches shortcut learning
val_domain_fraction: 0.2     # 20% of unique doc types go to val

# model
backbone: vit_base_patch16_384.orig_in21k
pretrained: true

# train — A100 (40 GB VRAM)
epochs: 20
batch_size: 16
lr: 0.0003
weight_decay: 0.0001
num_workers: 4
label_smoothing: 0.1

# Baseline experiment. Copy this file per experiment and commit it — one yaml = one run.
name: baseline
seed: 42

# data
data_dir: data
image_size: 384
val_fraction: 0.1

# model
backbone: tf_efficientnetv2_s.in21k
pretrained: true

# train
epochs: 20
batch_size: 32
lr: 0.0003
weight_decay: 0.0001
num_workers: 8

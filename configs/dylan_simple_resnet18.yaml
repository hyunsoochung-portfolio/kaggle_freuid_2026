# Dylan's simple baseline: small ImageNet-pretrained backbone, fast to iterate on.
name: dylan_simple_resnet18
seed: 42

# data
data_dir: data
image_size: 224
val_fraction: 0.1

# model
backbone: resnet18
pretrained: true

# train
epochs: 5
batch_size: 32
lr: 0.0003
weight_decay: 0.0001
num_workers: 4

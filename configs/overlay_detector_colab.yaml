# Overlay detector — Colab/A100 variant of configs/overlay_detector.yaml.
#
# Same model + hyperparameters as overlay_detector.yaml; only the two
# environment-specific paths differ, so the crop cache survives Colab's
# ephemeral disk and the ~1–2 hr MTCNN pass is paid once, not per session.
#
#   data_dir         -> LOCAL Colab disk (/content): fast NVMe decode of the
#                       69k full-res JPEGs during the crop pass.
#   crop_cache_dir   -> Google DRIVE: small face crops persist across sessions,
#                       so later runs skip the crop pass entirely.
#
# PREREQ: mount Drive first, e.g. in a notebook cell:
#     from google.colab import drive; drive.mount('/content/drive')
# Adjust the Drive path below to wherever you keep this project's artifacts.
name: overlay-detector
seed: 42

# --- Config dataclass fields (consumed by the shared pipeline) ---
data_dir: data/raw # local /content checkout — keep raws OFF Drive for fast reads
image_size: 224 # overlay net is tuned for 224, not the 384 baseline default
val_fraction: 0.1
epochs: 3
batch_size: 64
lr: 0.0001
weight_decay: 0.0001
num_workers: 0 # MTCNN singleton is not fork-safe; keep 0 (see workflow note)
# limit: 256             # uncomment for a smoke run

# --- overlay-only knobs → land in cfg.extra ---
model_type: overlay # the dispatch flag train.py/infer.py branch on

model: # → cfg.extra["model"]  (read by build_overlay_model / the network)
  type: overlay
  noise_frontend: bayar # or "srm"
  noise_feat_dim: 128
  use_rgb_stream: true
  rgb_backbone: resnet34
  rgb_pretrained: true
  fusion_dim: 128

overlay: # → cfg.extra["overlay"]  (read by OverlayDataset / precache_crops)
  crop_margin: 0.75
  crop_cache_dir: /content/drive/MyDrive/freuid/overlay_crops # persists across sessions

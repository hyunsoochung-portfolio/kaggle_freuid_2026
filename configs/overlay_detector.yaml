# Overlay detector — two-stream (forensic noise + RGB) face-region fraud net.
name: overlay-detector
seed: 42

# --- Config dataclass fields (consumed by the shared pipeline) ---
data_dir: data
image_size: 224 # overlay net is tuned for 224, not the 384 baseline default
val_fraction: 0.1
epochs: 3
batch_size: 16
lr: 0.0001
weight_decay: 0.0001
num_workers: 0 # MTCNN singleton is not fork-safe; keep 0 (see workflow note)
# limit: 256             # uncomment for a smoke run

# --- overlay-only knobs → land in cfg.extra ---
model_type: overlay # the dispatch flag train.py/infer.py branch on

model: # → cfg.extra["model"]  (read by build_overlay_model / the network)
  type: overlay
  noise_frontend: bayar # or "srm"
  noise_feat_dim: 128
  use_rgb_stream: true
  rgb_backbone: resnet34
  rgb_pretrained: true
  fusion_dim: 128

overlay: # → cfg.extra["overlay"]  (read by OverlayDataset / precache_crops)
  crop_margin: 0.75
  crop_cache_dir: data/processed/overlay_crops

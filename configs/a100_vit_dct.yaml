name: a100_vit_dct
seed: 42

# data
data_dir: data
image_size: 384
val_strategy: cross_domain
val_domain_fraction: 0.2

# model
backbone: vit_base_patch16_384.orig_in21k
pretrained: true
use_dct: true       # DualStream (RGB + DCT branch) 활성화

# train
epochs: 20
batch_size: 16
lr: 0.0001          # DCT branch 추가로 더 보수적으로
weight_decay: 0.0001
num_workers: 4
label_smoothing: 0.1
